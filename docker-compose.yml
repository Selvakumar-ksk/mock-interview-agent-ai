version: "3.9"
services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - server
    restart: unless-stopped
